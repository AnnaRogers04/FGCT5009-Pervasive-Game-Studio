<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UCA Location Hunt</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background-color: #008080;
      font-family: 'MS Sans Serif', Arial, sans-serif;
      color: #000;
      min-height: 100%;
      height: 100%;
      width: 100%;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 30px 20px;
    }
    .container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .window {
      background: #c0c0c0;
      border-top: 2px solid #ffffff;
      border-left: 2px solid #ffffff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      box-shadow: 2px 2px 0 #000;
      width: 100%;
    }
    .window-body { padding: 16px; }
    .inset-white {
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #ffffff;
      border-bottom: 2px solid #ffffff;
      background: #ffffff;
      padding: 16px;
      font-size: 16px;
      line-height: 1.7;
      font-weight: bold;
    }
    a.win98-link {
      display: block;
      font-family: 'MS Sans Serif', Arial, sans-serif;
      font-size: 16px;
      font-weight: bold;
      color: #000;
      text-decoration: none;
      background: #c0c0c0;
      border-top: 2px solid #ffffff;
      border-left: 2px solid #ffffff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      padding: 16px 20px;
      cursor: pointer;
      width: 100%;
      box-shadow: 2px 2px 0 #000;
      text-align: center;
    }
    a.win98-link:active {
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #ffffff;
      border-bottom: 2px solid #ffffff;
      padding: 17px 19px 15px 21px;
    }
    @media (min-width: 601px) {
      .container { max-width: 800px; }
      .inset-white { font-size: 22px; }
      a.win98-link { font-size: 22px; padding: 22px 24px; }
    }
    @media (max-width: 600px) {
      body { align-items: flex-start; padding: 20px 16px; }
      .inset-white { font-size: 15px; }
      a.win98-link { font-size: 15px; padding: 18px 16px; }
    }
  </style>
</head>
<body>
<link href="style.css" rel="stylesheet" type="text/css" />
  <div class="container">
    <div class="window">
      <div class="window-body">
        <div class="inset-white">
          Welcome to our UCA location hunt, follow the clues and images to get to the final location!
        </div>
      </div>
    </div>
    <a class="win98-link" href="FirstLocation.html">Go to First Location</a>
    <a class="win98-link" href="SecondLocation.html">Go to Second Location</a>
    <a class="win98-link" href="TerrierBooks.html">Go to Terrier Books</a>
    <a class="win98-link" href="Abyss.html">Go to The Abyss Movie Website</a>
    <a class="win98-link" href="BirdWatching.html">Become one with the Birds</a>
  </div>
</body>
</html>
