<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background-color: #1CA698;
      margin: 0;
    }
    p {
      font-family: 'Lucida Console', Monaco, monospace;
      color: black;
      font-weight: bold;
      font-size: 18px;
      margin: 0;
    }
    .banner {
      background-color: #148F83;
      border-top: 2px solid #1CA698;

      padding: 20px 30px;

      width: 100%;
      box-sizing: border-box;
      margin-bottom: 20px;
    }
    a.win98-link {
      display: block;
      font-family: 'Lucida Console', Monaco, monospace;
      font-weight: bold;
      font-size: 16px;
      color: black;
      text-decoration: none;
      background-color: #c0c0c0;
      border-top: 2px solid #ffffff;
      border-left: 2px solid #ffffff;
      border-bottom: 2px solid #808080;
      border-right: 2px solid #808080;
      padding: 15px 32px;
      margin-bottom: 10px;
      width: fit-content;
      cursor: pointer;
    }
    a.win98-link:active {
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-bottom: 2px solid #ffffff;
      border-right: 2px solid #ffffff;
    }
    @media (max-width: 768px) {
      p {
        font-size: 32px;
      }
      a.win98-link {
        font-size: 28px;
        padding: 15px 32px;

  <title>UCA Location Hunt</title>
