<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UCA Location Hunt</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background-color: #008080;
      font-family: 'MS Sans Serif', Arial, sans-serif;
      font-size: 11px;
      color: #000;
      min-height: 100vh;
      padding: 20px;
    }

    .window {
      background: #c0c0c0;
      border-top: 2px solid #ffffff;
      border-left: 2px solid #ffffff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      box-shadow: 2px 2px 0 #000;
      width: 100%;
      max-width: 700px;
      margin: 0 auto 16px auto;
    }

    .window-body { padding: 12px; }

    .inset-white {
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #ffffff;
      border-bottom: 2px solid #ffffff;
      background: #ffffff;
      padding: 12px;
      margin-bottom: 10px;
      font-size: 14px;
      line-height: 1.6;
      font-weight: bold;
    }

    a.win98-link {
      display: block;
      font-family: 'MS Sans Serif', Arial, sans-serif;
      font-size: 13px;
      font-weight: bold;
      color: #000;
      text-decoration: none;
      background: #c0c0c0;
      border-top: 2px solid #ffffff;
      border-left: 2px solid #ffffff;
      border-right: 2px solid #808080;
      border-bottom: 2px solid #808080;
      padding: 10px 16px;
      cursor: pointer;
      width: 100%;
      box-shadow: 2px 2px 0 #000;
    }

    a.win98-link:active {
      border-top: 2px solid #808080;
      border-left: 2px solid #808080;
      border-right: 2px solid #ffffff;
      border-bottom: 2px solid #ffffff;
      padding: 9px 15px 7px 17px;
    }

    @media (max-width: 768px) {
      .inset-white { font-size: 13px; }
      a.win98-link { font-size: 12px; }
    }
  </style>
</head>
<body>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <div class="window">
    <div class="window-body">
      <div class="inset-white">
        Welcome to our UCA location hunt, follow the clues and images to get to the final location!
      </div>
    </div>
  </div>

  <div style="width:100%; max-width:700px; margin: 0 auto; display:flex; flex-direction:column; gap:10px;">
    <a class="win98-link" href="FirstLocation.html">Go to First Location</a>
    <a class="win98-link" href="TerrierBooks.html">Go to Terrier Books</a>
  </div>

</body>
</html>
